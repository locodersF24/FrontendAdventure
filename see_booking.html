<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update booking</title>
    <script type="module">
        import {sendFormWhenSubmit, timeSlotCodeToTimeInterval} from "./js/library.js";
        const id = new URLSearchParams(window.location.search).get("reservationId");
        for (let i = 1; i < 10; i++) {
            const option = document.createElement("option");
            document.querySelector(".timeSlotCode").append(option);
            option.value = i.toString();
            option.className = "t" + i; // Class name cannot start with number.
            option.innerText = timeSlotCodeToTimeInterval(i);
        }
        fetch("http://localhost:8080/bookings/" + id)
            .then((response) => response.json())
            .then((data) => {
                Object.entries(data).forEach(([key, value]) => {
                    if (key === "activity") {
                        const option = document.querySelector("." + value);
                        option.selected = true;
                    } else if (key === "timeSlotCode") {
                        const option = document.querySelector(".t" + value);
                        option.selected = true;
                    } else {
                        const input = document.querySelector("." + key);
                        input.setAttribute("value", value);
                    }
                });
            });
        sendFormWhenSubmit(
            "PUT",
            "http://localhost:8080/bookings/" + id,
            "updateBooking",
            true,
            (response) => {
                if (response.ok) {
                    alert("Saved successfully!");
                } else {
                    alert("Something went wrong.");
                }
            }
        );
    </script>
</head>
<body>
<h1>Update booking</h1>
<form class="updateBooking">
    <input type="hidden" name="reservationId" class="reservationId">
    <label>
        First Name:
        <input type="text" name="firstName" class="firstName">
    </label>
    <br>
    <label>
        Last Name:
        <input type="text" name="lastName" class="lastName">
    </label>
    <br>
    <label>
        Phone number:
        <input type="tel" pattern="[0-9]{8}" name="phoneNumber" class="phoneNumber">
    </label>
    <br>
    <label>
        E-mail address:
        <input type="email" name="email" class="email">
    </label>
    <br>
    <label>
        Activity:
        <select name="activity">
            <!-- Hardcoded for now -->
            <option value="Go-kart" class="Go-kart">Go-kart</option>
            <option value="Minigolf" class="Minigolf">Minigolf</option>
            <option value="Paintball" class="Paintball">Paintball</option>
            <option value="Sumo Wrestling" class="Sumo Wrestling">Sumo Wrestling</option>
        </select>
    </label>
    <br>
    <label>
        Event date:
        <input type="date" name="date" class="date">
    </label>
    <br>
    <label>
        Event time:
        <select name="timeSlotCode" class="timeSlotCode"></select>
    </label>
    <br>
    <label>
        For:
        <input type="number" min="1" name="numberOfPeople" class="numberOfPeople">
    </label>
    <br>
    <button type="submit">Save</button>
</form>

</body>
</html>
