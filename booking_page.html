<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking</title>
    <link rel="stylesheet" href="css/bookingpage.css">
</head>
<body>

<h1>Book an activity!</h1>
<form id="bookingForm">
    <label for="activity">Activity:</label>
    <select id="activity" name ="activity">
        <option value="Go-kart">Go-kart</option>
        <option value="Mini-golf">Mini-golf</option>
        <option value="Paintball">Paintball</option>
        <option value="Sumo-wrestling">Sumo Wrestling</option>
    </select>

    <label for="numberOfPeople">Number of People:</label>
    <input type="number" id="numberOfPeople" name="numberOfPeople" min="1" required>

    <label for="date">Date:</label>
    <input type="date" id="date" name="date" required>

    <label for="time">Time:</label>
    <input type="time" id="time" name="time" required>

</form>

<h2>Availability Calendar</h2>
<div>
<div id="calendar"></div>

    <label for="month">Month:</label>
    <select id="month">
        <option value="0">January</option>
        <option value="1">February</option>
        <option value="2">March</option>
        <option value="3">April</option>
        <option value="4">May</option>
        <option value="5">June</option>
        <option value="6">July</option>
        <option value="7">August</option>
        <option value="8">September</option>
        <option value="9">October</option>
        <option value="10">November</option>
        <option value="11">December</option>
    </select>

    <label for="year">Year:</label>
    <input type="number" id="year" min="2025" max="2030" value="2025">
</div>

<button type="submit">Book Now</button>
<p id="confirmationMessage"></p>

<script src="js/bookingpage.js"></script>

</body>
</html>
