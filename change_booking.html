<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit reservation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Edit reservation</h1>
    </header>

<div class="form-container">
    <form action="http://localhost:8080/reservations/{id}" method="put">
        <div class="form-group">
            <label>Activity:
            <select name ="activity" class="inpActivity" required>
                <option value="Go-kart">Go-kart</option>
                <option value="Mini-golf">Mini-golf</option>
                <option value="Paintball">Paintball</option>
                <option value="Sumo-wrestling">Sumo Wrestling</option>
            </select>
            </label>
        </div>
        <br>
        <div class="form-group">
            <label class="form-lab">Persons
            <input
                    type="number"
                    name="numberOfPeople"
                    value=""
                    class="inpNumberOfPeople"
                    required
            >
            </label>
        </div>
        <br>
        <div class="form-group">
            <label class="form-lab">Date
            <input
                    type="date"
                    name="date"
                    value=""
                    class="inpDate"
                    required
            >
            </label>
        </div>
        <br>
        <div class="form-group">
            <label class="form-lab">Time slot
            <select name="timeSlot" class="inpTimeSlot" required>
                <option value="9.00-10.00">9.00-10.00</option>
                <option value="10.00-11.00">10.00-11.00</option>
                <option value="11.00-12.00">11.00-12.00</option>
                <option value="12.00-13.00">12.00-13.00</option>
                <option value="13.00-14.00">13.00-14.00</option>
                <option value="14.00-15.00">14.00-15.00</option>
                <option value="15.00-16.00">15.00-16.00</option>
                <option value="16.00-17.00">16.00-17.00</option>
            </select>
            </label>
        </div>
        <br>
        <h4>Contact person</h4>
        <div class="form-group">
            <label class="form-lab">Firstname
            <input
                    type="text"
                    name="firstName"
                    value=""
                    class="inpFirstName"
                    required
            >
            </label>
        </div>
        <br>
        <div class="form-group">
            <label class="form-lab">Lastname
            <input
                    type="text"
                    name="lastName"
                    value=""
                    class="inpLastName"
                    required
            >
            </label>
        </div>
        <br>
        <div class="form-group">
            <label class="form-lab">E-mail
            <input
                    type="text"
                    name="email"
                    value=""
                    class="inpEmail"
                    required
            >
            </label>
        </div>
        <br>
        <div class="form-group">
            <label class="form-lab">Phone number
            <input
                    type="text"
                    name="phoneNumber"
                    value=""
                    class="inpPhoneNumber"
                    required
            >
            </label>
        </div>
        <br>

        <button type="submit">Save</button>
    </form>

    <br>
    <button>Back</button>
    <button type="submit">Delete reservation</button>

</div>

</body>
<script src="js/changebooking.js"></script>
</html>
