<body>
<div class="hero-section bookings">
    <h1>Overview of bookings</h1>
</div>

<p></p>
<div class="booking-overview">
<form class="searchForm">
    <label>
        First Name:
        <input type="text" name="firstName">
    </label>
    <label>
        Last Name:
        <input type="text" name="lastName">
    </label>
    <label>
        Phone number:
        <input type="text" pattern="[0-9]{8}" name="phoneNumber">
    </label>
    <label>
        E-mail address:
        <input type="email" name="email">
    </label>
    <br><br>
    <div class="booking-overview">
    <label class="activity-select">
        Activity:
        <select name="activity">
            <!-- Hardcoded for now -->
            <option></option>
            <option value="Go-kart">Go-kart</option>
            <option value="Minigolf">Minigolf</option>
            <option value="Paintball">Paintball</option>
            <option value="Sumo Wrestling">Sumo Wrestling</option>
        </select>
    </label>
    </div>
    <label>
        Event date:
        <input type="date" name="date">
    </label>
    <button class="btn" type="submit">Search</button>
    <button class="btn" type="reset">Clear</button>
</form>
</div>
<br>
<table>
    <thead></thead>
    <tbody></tbody>
</table>
<p></p>
</body>
