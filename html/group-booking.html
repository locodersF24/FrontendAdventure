<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Group booking</title>
  <link rel="stylesheet" href="../css/booking.css">
</head>
<body>

<!-- Baggrundsbillede og titel -->
<div class="hero-section group-hero">
  <h1>Group booking</h1>
</div>

<!-- Beskrivelses-sektionen med tekst -->
<div class="activity-description">
  <p>Book for your company team building day, birthday party or bachelor party here.</p>
</div>

<!-- Booking-containeren -->
<div class="booking-container">
  <h2>Book an activity</h2>

  <!-- Vælg aktivitet -->
  <div class="input-group">
    <label for="activity-select">Select activity</label>
    <select id="activity-select">
      <option value="minigolf_group">Minigolf (4 hours)</option>
      <option value="gokart_group">Go-kart (4 hours)</option>
      <option value="climbing_group">Climbing (4 hours)</option>
      <option value="sumowrestling_group">Sumowrestling (3 hours)</option>
    </select>
  </div>

  <!-- Vælg dato -->
  <div class="input-group">
    <label>Select date</label>
    <input type="date" id="date-picker">
  </div>

  <!-- Vælg antal personer -->
  <div class="input-group">
    <label>Select number of people</label>
    <div class="counter">
      <button id="minus-btn">-</button>
      <input type="text" id="person-count" value="1" readonly>
      <button id="plus-btn">+</button>
    </div>
  </div>

  <!-- Vælg et tidspunkt -->
  <div class="input-group">
    <label>Select a time slot</label>
    <div id="time-slots"></div>
  </div>

  <div class="input-group">
    <label for="first-name">First Name</label>
    <input type="text" id="first-name" required>
  </div>

  <div class="input-group">
    <label for="last-name">Last Name</label>
    <input type="text" id="last-name" required>
  </div>

  <div class="input-group">
    <label for="phone">Telephone Number</label>
    <input type="tel" id="phone" maxlength="8" pattern="\d{8}" required>
  </div>

  <div class="input-group">
    <label for="email">Mail</label>
    <input type="email" id="email" required>
  </div>

  <button id="book-btn">Book activity</button>
</div>

<footer>

</footer>

<script defer src="/js/script.js"></script>

</body>
</html>
