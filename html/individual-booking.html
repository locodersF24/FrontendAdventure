<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Individual booking</title>
  <link rel="stylesheet" href="../css/booking.css">
</head>
<body>
<!-- Baggrundsbillede og titel -->
<div class="hero-section individual-hero">
  <h1>Individual booking</h1>
</div>

<!-- Beskrivelses-sektionen med tekst -->
<div class="activity-description">
  <p>Book an activity for a smaller group or individuals.</p>
</div>

<!-- Booking-containeren -->
<div class="booking-container">
  <h2>Book an activity</h2>
  <form class="booking">
  <!-- Vælg aktivitet -->
  <div class="input-group">
    <label for="activity-select">Select activity</label>
    <select id="activity-select">
      <option value="minigolf">Minigolf (1.5 hour, max 4 people)</option>
      <option value="gokart">Go-kart (30 min, max 8 people)</option>
      <option value="climbing">Climbing (1 hour, max 6 people)</option>
      <option value="sumowrestling">Sumowrestling (45 min, max 2 people)</option>
    </select>
  </div>

  <!-- Vælg dato -->
  <div class="input-group">
    <label>Select date</label>
    <input type="date" id="date-picker">
  </div>

  <!-- Vælg antal personer -->
  <div class="input-group">
    <label>Select number of people</label>
    <div class="counter">
      <button id="minus-btn">-</button>
      <input type="text" id="person-count" value="1" readonly>
      <button id="plus-btn">+</button>
    </div>
  </div>

  <!-- Vælg et tidspunkt -->
  <div class="input-group">
    <label>Select a time slot</label>
    <div id="time-slots"></div>
  </div>

  <div class="input-group">
    <label for="first-name">First Name</label>
    <input type="text" id="first-name" required>
  </div>

  <div class="input-group">
    <label for="last-name">Last Name</label>
    <input type="text" id="last-name" required>
  </div>

  <div class="input-group">
    <label for="phone">Telephone Number</label>
    <input type="tel" id="phone" maxlength="8" pattern="\d{8}" required>
  </div>

  <div class="input-group">
    <label for="email">Mail</label>
    <input type="email" id="email" required>
  </div>

  <button type="submit" id="book-btn">Book activity</button>
  </form>
</div>
<p></p>

<footer>
</footer>
<script defer src="/js/script.js"></script>

</body>
</html>
