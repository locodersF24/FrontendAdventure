<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Individual booking</title>
  <link rel="stylesheet" href="../css/booking.css">
  <script type="module">
    import run from "../js/individual-booking.js";
    run();
  </script>
</head>
<body>
<!-- Baggrundsbillede og titel -->
<div class="hero-section individual-hero">
  <h1>Individual booking</h1>
</div>

<!-- Beskrivelses-sektionen med tekst -->
<div class="activity-description">
  <p>Book an activity for a smaller group or individuals.</p>
</div>

<!-- Booking-containeren -->
<div class="booking-container">
  <h2>Book an activity</h2>

  <!-- Vælg aktivitet -->
  <div class="input-group">
    <label for="activity-select">Select activity</label>
    <select id="activity-select"></select>
  </div>

  <!-- Vælg antal personer -->
  <div class="input-group">
    <label for="person-count">Select number of people</label>
    <div class="counter">
      <button type="button" id="minus-btn">-</button>
      <input type="text" id="person-count" readonly>
      <button type="button" id="plus-btn">+</button>
    </div>
  </div>

  <!-- Vælg dato -->
  <div class="input-group">
    <label for="date-picker">Select date</label>
    <input type="date" id="date-picker" required>
  </div>

  <!-- Vælg et tidspunkt -->
  <div class="input-group">
    <label>Select a time slot</label>
    <div id="time-slots"></div>
  </div>

  <form class="contact">
  <div class="input-group">
    <label for="first-name">First Name</label>
    <input type="text" id="first-name" name="firstName" required>
  </div>

  <div class="input-group">
    <label for="last-name">Last Name</label>
    <input type="text" id="last-name" name="lastName" required>
  </div>

  <div class="input-group">
    <label for="phone">Telephone Number</label>
    <input type="tel" id="phone" pattern="\d{8}" name="phoneNumber" required>
  </div>

  <div class="input-group">
    <label for="email">Mail</label>
    <input type="email" id="email" name="email" required>
  </div>

  <button type="submit" id="book-btn">Book activity</button>
  </form>
</div>

</body>
</html>
